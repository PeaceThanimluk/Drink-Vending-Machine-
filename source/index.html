<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drink Vending Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="wrapper"> <!--Display Grid-->
            <div class="header-Label">
                <h1>Drink Vending Machine</h1>
            </div>

            <div class="machine">

                <div class="product-container"> <!--Grid-->
                    <div class="product product1">
                        <div class="image-box"><img src="/Assets/Product-Image/1-coke.webp" alt="product1"></div>
                        <div class="info-box">1</div>
                    </div>


                    <div class="product product2">
                        <div class="image-box"><img src="/Assets/Product-Image/2-pepsi.jpg" alt="product2"></div>
                        <div class="info-box">2</div>
                    </div>


                    <div class="product product3">
                        <div class="image-box"><img src="/Assets/Product-Image/3-sprite.webp" alt="product3"></div>
                        <div class="info-box">3</div>
                    </div>


                    <div class="product product4">
                        <div class="image-box"><img src="/Assets/Product-Image/4-menera.webp" alt="product4"></div>
                        <div class="info-box">4</div>
                    </div>


                    <div class="product product5">
                        <div class="image-box"><img src="/Assets/Product-Image/5-nestle-purelife.webp" alt="product5"></div>
                        <div class="info-box">5</div>
                    </div>


                    <div class="product product6">
                        <div class="image-box"><img src="/Assets/Product-Image/6-ichitan.jpg" alt="product6"></div>
                        <div class="info-box">6</div>
                    </div>


                    <div class="product product7">
                        <div class="image-box"><img src="/Assets/Product-Image/7-oichi-lemon.jpg" alt="product7"></div>
                        <div class="info-box">7</div>
                    </div>


                    <div class="product product8">
                        <div class="image-box"><img src="/Assets/Product-Image/8-oichi-grape.jpg" alt="product8"></div>
                        <div class="info-box">8</div>
                    </div>


                    <div class="product product9">
                        <div class="image-box"><img src="/Assets/Product-Image/9-aura-monster.jpg" alt="product9"></div>
                        <div class="info-box">9</div>
                    </div>
                </div>

                <div class="control">

                    <div class="keypad-container">
                        <div class="input-label">กรอกหมายเลขที่ต้องการ</div>
                        <div class="display-box"></div>

                        <div class="keypad-grid"> <!--grid-->
                            <button class="key-btn">1</button>
                            <button class="key-btn">2</button>
                            <button class="key-btn">3</button>
                            <button class="key-btn">4</button>
                            <button class="key-btn">5</button>
                            <button class="key-btn">6</button>
                            <button class="key-btn">7</button>
                            <button class="key-btn">8</button>
                            <button class="key-btn">9</button>
                            <button class="key-btn">0</button>
                            <button class="key-btn backSpace-btn">&lt;</button>
                        </div>

                        <button class="buy-btn">ซื้อ</button>
                    </div>
                </div>
            </div>

            <div class="money-container">
                <div class="money-label">เงินของคุณ</div>
                <div class="money-display">0</div>
                <button class="money-btn">กดเพื่อทำเงิน</button>
            </div>

        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
